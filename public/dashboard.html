<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Vero Admin Dashboard" />
  <title>Vero Admin — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Animated background orbs -->
  <div class="bg-orb bg-orb--1"></div>
  <div class="bg-orb bg-orb--2"></div>
  <div class="bg-orb bg-orb--3"></div>

  <main class="dashboard-container">
    <div class="dashboard-card">
      <!-- Success Icon -->
      <div class="dashboard-icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
      </div>

      <h1>Welcome to Vero Admin</h1>
      <p class="welcome-text">You have successfully authenticated.</p>

      <!-- Admin Info -->
      <div class="admin-info" id="adminInfo">
        <div class="admin-info-row">
          <span class="admin-info-label">Username</span>
          <span class="admin-info-value" id="adminUsername">—</span>
        </div>
        <div class="admin-info-row">
          <span class="admin-info-label">Role</span>
          <span class="admin-info-value" id="adminRole">—</span>
        </div>
        <div class="admin-info-row">
          <span class="admin-info-label">Session Status</span>
          <span class="admin-info-value" style="color: var(--success);">● Active</span>
        </div>
      </div>

      <button class="btn-logout" id="logoutBtn">Sign Out</button>
    </div>
  </main>

  <script>
    (function () {
      'use strict';

      /**
       * Fetch admin info from the protected dashboard endpoint.
       * Uses the JWT from httpOnly cookie or sessionStorage fallback.
       */
      async function loadDashboard() {
        try {
          const token = sessionStorage.getItem('vero_admin_token');

          const headers = {};
          if (token) {
            headers['Authorization'] = 'Bearer ' + token;
          }

          const response = await fetch('/api/admin/dashboard', {
            method: 'GET',
            credentials: 'include',
            headers,
          });

          const data = await response.json();

          if (data.success && data.admin) {
            document.getElementById('adminUsername').textContent = data.admin.username || '—';
            document.getElementById('adminRole').textContent = (data.admin.role || '—').toUpperCase();
          } else {
            // Not authenticated — redirect to login
            window.location.href = '/';
          }
        } catch (error) {
          window.location.href = '/';
        }
      }

      /**
       * Handle logout: call API, clear local storage, redirect.
       */
      async function handleLogout() {
        try {
          const token = sessionStorage.getItem('vero_admin_token');
          const headers = { 'Content-Type': 'application/json' };
          if (token) {
            headers['Authorization'] = 'Bearer ' + token;
          }

          await fetch('/api/admin/logout', {
            method: 'POST',
            credentials: 'include',
            headers,
          });
        } catch (error) {
          // Logout even if API call fails
        } finally {
          sessionStorage.removeItem('vero_admin_token');
          window.location.href = '/';
        }
      }

      // Initialize
      loadDashboard();
      document.getElementById('logoutBtn').addEventListener('click', handleLogout);
    })();
  </script>
</body>
</html>
